name: Claude Review Fix Once

on:
  pull_request_review:
    types: [submitted]

jobs:
  claude-review-fix:
    if: >
      github.event.review.user.login == 'chatgpt-codex-connector[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    concurrency:
      group: claude-review-fix-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: Guard — check labels
        id: labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')
          echo "Labels on PR #$PR_NUMBER:"
          echo "$LABELS"

          if ! echo "$LABELS" | grep -xF 'claude:ready' > /dev/null; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: claude:ready label not present."
            exit 0
          fi
          if echo "$LABELS" | grep -xF 'claude:blocked' > /dev/null; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: claude:blocked label present."
            exit 0
          fi
          if echo "$LABELS" | grep -xF 'needs:human-decision' > /dev/null; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: needs:human-decision label present."
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Guard — check for existing marker
        id: marker
        if: steps.labels.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          MARKER='<!-- claude-review-fix-pass:v1 -->'
          COMMENTS=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate --jq '.[].body')
          if printf '%s\n' "$COMMENTS" | grep -F "$MARKER" > /dev/null; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: marker already present — one-pass limit enforced."
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude review-fix pass
        if: steps.labels.outputs.proceed == 'true' && steps.marker.outputs.proceed == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: chatgpt-codex-connector[bot]
          claude_args: >-
            --max-turns 5
            --permission-mode acceptEdits
            --allowedTools Read,Edit,Write,Bash(git status*),Bash(git diff*),Bash(git add*),Bash(git commit*),Bash(git push*),Bash(git config*),Bash(gh api*),Bash(gh pr comment*)
          prompt: |
            You are performing ONE review-fix pass on this PR. Read all constraints before acting.

            HARD CONSTRAINTS — violating any of these is not permitted:
            - Address only the Codex review feedback on this PR. Do not fix unrelated things.
            - Do NOT merge the PR.
            - Do NOT enable auto-merge.
            - Do NOT alter branch protection.
            - Do NOT add secrets or credentials.
            - Do NOT create orchestration infrastructure, dashboards, parsers, or validators.
            - Do NOT reference or reuse l5-adf code or design.
            - This is your ONLY pass. Do not expect or request a second pass.
            - Do NOT run PR-controlled scripts, including scripts/test.sh or scripts/verify.sh. This
              job runs with ANTHROPIC_API_KEY and write-capable GitHub credentials. Running PR-owned
              shell scripts in this context is not safe. The normal CI workflow is responsible for
              running tests and verification after this job pushes changes. If you cannot safely
              address the feedback without running test scripts, post the BLOCKED marker instead.

            STEPS — follow in order:
            1. Read only the triggering Codex review for this workflow run:
               - Triggering review submission:
                 gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews/${{ github.event.review.id }}"
               - Inline review comments for the triggering review only:
                 gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments" --paginate --jq '[.[] | select(.pull_request_review_id == ${{ github.event.review.id }})]'
               Use only feedback from this triggering review by chatgpt-codex-connector[bot].
            2. Address the Codex review feedback by reading and editing files on this branch.
               Do not run any scripts from the repository.
            3. If changes were made:
               - commit them to this branch with a short descriptive commit message
               - push the commit to the PR branch
               - verify the push succeeded before posting the marker
            4. Post this exact comment on the PR only after any created commit has been pushed successfully (use gh pr comment or gh api):
               <!-- claude-review-fix-pass:v1 -->
               Claude review-fix pass complete.
            5. If blocked or unable to safely address the feedback, post this instead:
               <!-- claude-review-fix-pass:v1 -->
               BLOCKED: [short plain-English reason — no sensitive details]

            Do not loop. Do not merge. Do not request a second pass.
